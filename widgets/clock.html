<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clock</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --blue: #3b9eff;
        --purple: #9b6dff;
        --green: #3bffb0;
        --gold: #ffd166;
        --text: #e8e8f0;
        --muted: #5a5a7a;
        --bg: #0d0d14;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Rajdhani", sans-serif;
        overflow: hidden;
      }

      .widget {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        padding: 10px 20px;
        animation: fadeIn 0.8s ease forwards;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .time-row {
        display: flex;
        align-items: baseline;
        gap: 2px;
      }

      .time {
        font-family: "DM Mono", monospace;
        font-size: 2.6rem;
        font-weight: 400;
        letter-spacing: 0.04em;
        color: var(--blue);
        text-shadow: 0 0 18px rgba(59, 158, 255, 0.45);
        line-height: 1;
      }

      .seconds {
        font-family: "DM Mono", monospace;
        font-size: 1.1rem;
        font-weight: 300;
        color: var(--purple);
        opacity: 0.85;
        letter-spacing: 0.04em;
        align-self: flex-end;
        padding-bottom: 4px;
      }

      .ampm {
        font-family: "Rajdhani", sans-serif;
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.18em;
        color: var(--muted);
        text-transform: uppercase;
        align-self: flex-end;
        padding-bottom: 6px;
        margin-left: 4px;
      }

      .date {
        font-size: 0.72rem;
        font-weight: 400;
        letter-spacing: 0.22em;
        color: var(--muted);
        text-transform: uppercase;
        margin-top: 2px;
      }

      .day {
        font-size: 0.62rem;
        font-weight: 600;
        letter-spacing: 0.28em;
        color: var(--gold);
        opacity: 0.7;
        text-transform: uppercase;
        margin-top: 1px;
      }

      .bar {
        width: 32px;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--blue),
          transparent
        );
        margin-top: 6px;
        opacity: 0.5;
      }

      /* pulse on seconds tick */
      @keyframes pulse {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.6;
        }
        100% {
          opacity: 1;
        }
      }
      .tick {
        animation: pulse 1s ease infinite;
      }
    </style>
  </head>
  <body>
    <div class="widget">
      <div class="time-row">
        <span class="time" id="time">00:00</span>
        <span class="seconds tick" id="seconds">:00</span>
        <span class="ampm" id="ampm">AM</span>
      </div>
      <div class="date" id="date">Monday, January 1</div>
      <div class="day" id="year">2025</div>
      <div class="bar"></div>
    </div>

    <script>
      const DAYS = [
        "Sunday",
        "Monday",
        "Tuesday",
        "Wednesday",
        "Thursday",
        "Friday",
        "Saturday",
      ];
      const MONTHS = [
        "January",
        "February",
        "March",
        "April",
        "May",
        "June",
        "July",
        "August",
        "September",
        "October",
        "November",
        "December",
      ];

      function update() {
        const now = new Date();
        let h = now.getHours();
        const m = now.getMinutes();
        const s = now.getSeconds();
        const ampm = h >= 12 ? "PM" : "AM";
        h = h % 12 || 12;

        document.getElementById("time").textContent =
          `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
        document.getElementById("seconds").textContent =
          `:${String(s).padStart(2, "0")}`;
        document.getElementById("ampm").textContent = ampm;
        document.getElementById("date").textContent =
          `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}`;
        document.getElementById("year").textContent = now.getFullYear();
      }

      update();
      setInterval(update, 1000);
    </script>
  </body>
</html>
